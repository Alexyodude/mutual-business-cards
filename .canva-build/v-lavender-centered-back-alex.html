<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1050px;height:600px;background:#f5f1fa;font-family:'Inter','Segoe UI','SF Pro Display','Helvetica Neue',Helvetica,Arial,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;color:#1e0e3d;overflow:hidden;-webkit-font-smoothing:antialiased}
.card{position:relative;width:1050px;height:600px;background:#f5f1fa;overflow:hidden}

.paper{position:absolute;inset:0;background:radial-gradient(ellipse 600px 400px at 20% 10%, rgba(255,255,255,0.5), transparent 70%), radial-gradient(ellipse 500px 400px at 90% 90%, rgba(0,0,0,0.04), transparent 70%);pointer-events:none}.frame{position:absolute;top:32px;left:32px;right:32px;bottom:32px;border:1px solid #6d28d933}
.tick{position:absolute;width:18px;height:18px;border-color:#6d28d9}
.tl{top:42px;left:42px;border-top:1.5px solid;border-left:1.5px solid}
.tr{top:42px;right:42px;border-top:1.5px solid;border-right:1.5px solid}
.bl{bottom:42px;left:42px;border-bottom:1.5px solid;border-left:1.5px solid}
.br{bottom:42px;right:42px;border-bottom:1.5px solid;border-right:1.5px solid}
</style></head><body><div class="card">
  <div class="paper"></div><div class="frame"></div>

    <div style="margin-top:18px;font-weight:600;font-size:26px;color:#7c3aed;letter-spacing:-0.3px">Co-founder · Hardware</div>
