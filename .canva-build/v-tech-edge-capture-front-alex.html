<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1050px;height:600px;background:#000000;font-family:'Inter','Segoe UI','SF Pro Display','Helvetica Neue',Helvetica,Arial,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;color:#fff;overflow:hidden;-webkit-font-smoothing:antialiased}
.card{position:relative;width:1050px;height:600px;background:linear-gradient(180deg,#000000 0%,#0a0a0a 100%);overflow:hidden}
.grid{position:absolute;inset:0;background-image:linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);background-size:42px 42px;mask-image:linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.95));-webkit-mask-image:linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.95))}
.tick{position:absolute;width:18px;height:18px;border-color:#8c7332}
.tl{top:42px;left:42px;border-top:1.5px solid;border-left:1.5px solid}
.tr{top:42px;right:42px;border-top:1.5px solid;border-right:1.5px solid}
.bl{bottom:42px;left:42px;border-bottom:1.5px solid;border-left:1.5px solid}
.br{bottom:42px;right:42px;border-bottom:1.5px solid;border-right:1.5px solid}
.mono{font-family:'JetBrains Mono','Consolas','Menlo','Monaco',monospace}
.ko{font-family:'Noto Sans KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif}
.serif{font-family:'Playfair Display','Georgia','Times New Roman',serif}
</style></head><body>
<div class="card">
  <div class="grid"></div>
  
      <div style="position:absolute;left:0;top:0;bottom:0;width:80px;background:radial-gradient(ellipse 80px 600px at 0% 50%, #c9a84c33 0%, transparent 70%);pointer-events:none"></div>
      <div style="position:absolute;left:32px;top:80px;bottom:80px;width:3px;background:linear-gradient(180deg,transparent 0%,#c9a84c 12%,#c9a84c 88%,transparent 100%);box-shadow:0 0 18px #c9a84c,0 0 36px #c9a84c66,0 0 64px #c9a84c33"></div>
      <div style="position:absolute;left:32px;top:80px;width:3px;height:3px;background:#c9a84c;border-radius:50%;box-shadow:0 0 16px #c9a84c"></div>
      <div style="position:absolute;left:32px;bottom:80px;width:3px;height:3px;background:#c9a84c;border-radius:50%;box-shadow:0 0 16px #c9a84c"></div>
  <div class="tick tl"></div><div class="tick tr"></div><div class="tick bl"></div><div class="tick br"></div>

  <!-- wordmark (per-cardholder: antimutual for Alex, mutual otherwise) -->
  <div style="position:absolute;top:104px;left:130px;display:flex;align-items:center;gap:28px;z-index:2">
    <img src="logo-antimutual.png" style="width:104px;height:104px;object-fit:contain">
    <div style="font-weight:800;font-size:96px;letter-spacing:-3.8px;color:#fff;line-height:1">antimutual<span style="font-size:24px;vertical-align:super;font-weight:500;letter-spacing:0;margin-left:4px;color:#94a3b8">™</span></div>
  </div>

  <!-- tagline (Korean primary, English secondary) -->
  <div style="position:absolute;left:130px;bottom:172px;text-align:left;z-index:2">
    <div class="ko" style="font-weight:700;font-size:36px;color:#8c7332;letter-spacing:-0.8px;line-height:1.2">카메라와 마이크. 진본을 증명합니다.</div>
    <div style="margin-top:14px;font-weight:600;font-size:30px;color:#94a3b8;letter-spacing:-0.4px;line-height:1.3;font-style:italic;font-family:'Playfair Display','Georgia','Times New Roman',serif;">Cameras and mics. Proven real.</div>
  </div>

  <!-- divider -->
  <div style="position:absolute;left:130px;right:96px;bottom:96px;height:1px;background:#94a3b844"></div>

  <!-- meta row -->
  <div class="mono" style="position:absolute;left:130px;right:96px;bottom:60px;display:flex;justify-content:space-between;align-items:center;font-size:24px;color:#94a3b8;letter-spacing:0.6px;font-weight:500;z-index:2">
    <div style="display:flex;gap:20px"><span style="color:#c9a84c;font-weight:600">FEK-1</span><span>·</span><span style="color:#c9a84c;font-weight:600">FORENSIC</span></div>
    <div>anti.mutual.solutions</div>
  </div>
  
      <div style="position:absolute;left:405px;top:180px;width:240px;height:240px;border:2px solid #c9a84c;border-radius:50%;box-shadow:0 0 30px #c9a84c55, inset 0 0 30px #c9a84c22;z-index:1;pointer-events:none"></div>
      <div style="position:absolute;left:521px;top:296px;width:8px;height:8px;background:#c9a84c;border-radius:50%;box-shadow:0 0 12px #c9a84c;z-index:1;pointer-events:none"></div>
</div></body></html>
