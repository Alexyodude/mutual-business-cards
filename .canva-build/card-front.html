<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1050px;height:600px;background:#0f172a;font-family:'Inter','SF Pro Display','Helvetica Neue',sans-serif;color:#fff;overflow:hidden}
.card{position:relative;width:1050px;height:600px;background:radial-gradient(ellipse 800px 600px at 95% 95%, rgba(34,211,238,0.22), transparent 70%), linear-gradient(135deg,#0f172a 0%, #1e293b 100%);overflow:hidden}
.grid{position:absolute;inset:0;background-image:linear-gradient(to right, rgba(255,255,255,0.045) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.045) 1px, transparent 1px);background-size:42px 42px;mask-image:linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.95));-webkit-mask-image:linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.95))}
.stripe{position:absolute;left:0;top:0;bottom:0;width:8px;background:linear-gradient(180deg,#22d3ee 0%, #4a8b9c 100%);box-shadow:0 0 28px rgba(34,211,238,0.7)}
.brand{position:absolute;top:96px;left:96px;display:flex;align-items:center;gap:28px}
.logo{width:104px;height:104px;display:flex;align-items:center;justify-content:center}
.logo img{width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1)}
.wordmark{font-weight:800;font-size:88px;letter-spacing:-3.5px;color:#fff;line-height:1}
.tm{font-size:28px;vertical-align:super;font-weight:500;letter-spacing:0;margin-left:4px;color:#94a3b8}
.tagline{position:absolute;left:96px;bottom:172px;color:#e2e8f0;font-weight:600;font-size:36px;letter-spacing:-0.6px;line-height:1.15;max-width:760px}
.tagline .accent{color:#22d3ee}
.caption{position:absolute;right:96px;bottom:64px;font-family:'JetBrains Mono', monospace;font-size:28px;color:#4a8b9c;letter-spacing:0.4px;font-weight:500}
.caption .dim{color:#334155}
.tick{position:absolute;width:22px;height:22px;border-color:#4a8b9c}
.tl{top:48px;left:48px;border-top:2px solid;border-left:2px solid}
.tr{top:48px;right:48px;border-top:2px solid;border-right:2px solid}
.bl{bottom:48px;left:48px;border-bottom:2px solid;border-left:2px solid}
.br{bottom:48px;right:48px;border-bottom:2px solid;border-right:2px solid}
.sigdot{position:absolute;right:88px;bottom:120px;width:10px;height:10px;background:#22d3ee;border-radius:50%;box-shadow:0 0 18px #22d3ee}
.hash{position:absolute;left:96px;top:240px;font-family:'JetBrains Mono', monospace;font-size:28px;color:#475569;letter-spacing:1px;font-weight:500}
.hash .pre{color:#22d3ee;margin-right:8px}
</style></head>
<body>
<div class="card">
  <div class="grid"></div>
  <div class="stripe"></div>
  <div class="tick tl"></div><div class="tick tr"></div><div class="tick bl"></div><div class="tick br"></div>
  <div class="brand">
    <div class="logo"><img src="https://mutual.solutions/img/logo.png" alt=""></div>
    <div class="wordmark">mutual<span class="tm">™</span></div>
  </div>
  <div class="hash"><span class="pre">SHA-256</span>7f3a · 9c2b · e441 · 8d05</div>
  <div class="tagline">Authenticity starts at the <span class="accent">source.</span></div>
  <div class="sigdot"></div>
  <div class="caption"><span class="dim">//</span> signed-at-capture</div>
</div>
</body></html>
