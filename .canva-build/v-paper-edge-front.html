<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1050px;height:600px;background:#f7f3ec;font-family:'Inter','Segoe UI','SF Pro Display','Helvetica Neue',Helvetica,Arial,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;color:#0f172a;overflow:hidden;-webkit-font-smoothing:antialiased}
.card{position:relative;width:1050px;height:600px;background:#f7f3ec;overflow:hidden}

.paper{position:absolute;inset:0;background:radial-gradient(ellipse 600px 400px at 20% 10%, rgba(255,255,255,0.5), transparent 70%), radial-gradient(ellipse 500px 400px at 90% 90%, rgba(0,0,0,0.04), transparent 70%);pointer-events:none}.frame{position:absolute;top:32px;left:32px;right:32px;bottom:32px;border:1px solid #2a556133}
.tick{position:absolute;width:18px;height:18px;border-color:#2a5561}
.tl{top:42px;left:42px;border-top:1.5px solid;border-left:1.5px solid}
.tr{top:42px;right:42px;border-top:1.5px solid;border-right:1.5px solid}
.bl{bottom:42px;left:42px;border-bottom:1.5px solid;border-left:1.5px solid}
.br{bottom:42px;right:42px;border-bottom:1.5px solid;border-right:1.5px solid}
</style></head><body><div class="card">
  
  <div class="paper"></div><div class="frame"></div>
  
  <div style="position:absolute;left:0;top:0;bottom:0;width:42px;background:linear-gradient(180deg,#4a8b9c 0%,#2a5561 100%);box-shadow:0 0 30px #4a8b9c66"></div>
  <div class="tick tl"></div><div class="tick tr"></div><div class="tick bl"></div><div class="tick br"></div>
  <div style="position:absolute;top:104px;left:120px;display:flex;align-items:center;gap:28px;justify-content:flex-start;z-index:2">
    <img src="logo-teal.svg" style="width:104px;height:104px;object-fit:contain">
    <div style="font-weight:800;font-size:96px;letter-spacing:-3.8px;color:#0f172a;line-height:1">mutual<span style="font-size:24px;vertical-align:super;font-weight:500;letter-spacing:0;margin-left:4px;color:#64748b">™</span></div>
  </div>
  <div style="position:absolute;left:120px;bottom:172px;text-align:left;z-index:2">
    <div style="font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:38px;color:#2a5561;letter-spacing:-0.8px;line-height:1.2">진본은 출처에서 시작됩니다.</div>
    <div style="margin-top:14px;font-weight:600;font-size:30px;color:#64748b;letter-spacing:-0.4px;line-height:1.3;font-style:italic">Authenticity starts at the source.</div>
  </div>
  <div style="position:absolute;left:120px;right:96px;bottom:96px;height:1px;background:#64748b44"></div>
  <div style="position:absolute;left:120px;right:96px;bottom:60px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:24px;color:#64748b;letter-spacing:0.6px;font-weight:500;z-index:2">
    <div style="display:flex;gap:20px"><span style="color:#4a8b9c;font-weight:600">C2PA</span><span>·</span><span style="color:#4a8b9c;font-weight:600">ECDSA</span><span>·</span><span style="color:#4a8b9c;font-weight:600">TrustZone</span></div>
    <div>mutual.solutions</div>
  </div>
</div></body></html>
