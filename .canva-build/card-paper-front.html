<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1050px;height:600px;background:#f7f3ec;font-family:'Inter','SF Pro Display','Helvetica Neue',sans-serif;color:#1a1a1a;overflow:hidden}
.card{position:relative;width:1050px;height:600px;background:#f7f3ec;overflow:hidden}
.paper{position:absolute;inset:0;background:
  radial-gradient(ellipse 600px 400px at 20% 10%, rgba(255,255,255,0.6), transparent 70%),
  radial-gradient(ellipse 500px 400px at 90% 90%, rgba(74,139,156,0.05), transparent 70%);
  pointer-events:none}
.frame{position:absolute;top:32px;left:32px;right:32px;bottom:32px;border:1px solid rgba(74,139,156,0.18)}
.brand{position:absolute;top:96px;left:88px;display:flex;align-items:center;gap:24px}
.brand img{width:84px;height:84px;object-fit:contain}
.wordmark{font-weight:800;font-size:104px;letter-spacing:-3.8px;color:#0f172a;line-height:1}
.tm{font-size:28px;vertical-align:super;font-weight:500;letter-spacing:0;margin-left:6px;color:#94a3b8}
.tagline{position:absolute;left:88px;bottom:172px;max-width:780px}
.tagline .ko{font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:40px;color:#2a5561;letter-spacing:-0.8px;line-height:1.2}
.tagline .en{margin-top:14px;font-weight:600;font-size:28px;color:#64748b;letter-spacing:-0.4px;line-height:1.3;font-style:italic}
.meta-rule{position:absolute;left:88px;right:88px;bottom:96px;height:1px;background:#cbd5e1}
.meta{position:absolute;left:88px;right:88px;bottom:60px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:24px;color:#64748b;letter-spacing:0.6px;font-weight:500}
.meta .left{display:flex;gap:18px}
.meta .left b{color:#4a8b9c;font-weight:600}
.meta .left span{color:#94a3b8;font-weight:400}
.meta .right{color:#94a3b8;font-weight:500}
.reg{position:absolute;width:14px;height:14px;border-color:#4a8b9c}
.r1{top:50px;left:50px;border-top:1.5px solid;border-left:1.5px solid}
.r2{top:50px;right:50px;border-top:1.5px solid;border-right:1.5px solid}
.r3{bottom:50px;left:50px;border-bottom:1.5px solid;border-left:1.5px solid}
.r4{bottom:50px;right:50px;border-bottom:1.5px solid;border-right:1.5px solid}
</style></head>
<body>
<div class="card">
  <div class="paper"></div>
  <div class="frame"></div>
  <div class="reg r1"></div><div class="reg r2"></div><div class="reg r3"></div><div class="reg r4"></div>

  <div class="brand">
    <img src="https://mutual.solutions/img/logo.png" alt="">
    <div class="wordmark">mutual<span class="tm">™</span></div>
  </div>

  <div class="tagline">
    <div class="ko">진본은 출처에서 시작됩니다.</div>
    <div class="en">Authenticity starts at the source.</div>
  </div>

  <div class="meta-rule"></div>
  <div class="meta">
    <div class="left">
      <b>C2PA</b><span>·</span><b>ECDSA</b><span>·</span><b>TrustZone</b>
    </div>
    <div class="right">mutual.solutions</div>
  </div>
</div>
</body></html>
