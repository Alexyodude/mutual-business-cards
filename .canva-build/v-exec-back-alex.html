<!DOCTYPE html><html><head><meta charset="utf-8">
<style>

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1050px;height:600px;background:#fafaf7;font-family:'Inter','SF Pro Display','Helvetica Neue',sans-serif;color:#0a1f3d;overflow:hidden;-webkit-font-smoothing:antialiased}
.card{position:relative;width:1050px;height:600px;background:#fafaf7;overflow:hidden}

.paper{position:absolute;inset:0;background:radial-gradient(ellipse 600px 400px at 20% 10%, rgba(255,255,255,0.5), transparent 70%), radial-gradient(ellipse 500px 400px at 90% 90%, rgba(0,0,0,0.04), transparent 70%);pointer-events:none}.frame{position:absolute;top:32px;left:32px;right:32px;bottom:32px;border:1px solid #8b6f2c33}
.tick{position:absolute;width:18px;height:18px;border-color:#8b6f2c}
.tl{top:42px;left:42px;border-top:1.5px solid;border-left:1.5px solid}
.tr{top:42px;right:42px;border-top:1.5px solid;border-right:1.5px solid}
.bl{bottom:42px;left:42px;border-bottom:1.5px solid;border-left:1.5px solid}
.br{bottom:42px;right:42px;border-bottom:1.5px solid;border-right:1.5px solid}
</style></head><body><div class="card">
