<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1050px;height:600px;background:#0f172a;font-family:'Inter','SF Pro Display','Helvetica Neue',sans-serif;color:#ffffff;overflow:hidden;-webkit-font-smoothing:antialiased}
.card{position:relative;width:1050px;height:600px;background:linear-gradient(90deg,#0f172a 0%, #0f172a 50%, #f7f3ec 50%, #f7f3ec 100%);overflow:hidden}


.tick{position:absolute;width:18px;height:18px;border-color:#4a8b9c}
.tl{top:42px;left:42px;border-top:1.5px solid;border-left:1.5px solid}
.tr{top:42px;right:42px;border-top:1.5px solid;border-right:1.5px solid}
.bl{bottom:42px;left:42px;border-bottom:1.5px solid;border-left:1.5px solid}
.br{bottom:42px;right:42px;border-bottom:1.5px solid;border-right:1.5px solid}
</style></head><body><div class="card">
  <div style="position:absolute;left:0;top:0;width:50%;height:100%;background:#0f172a;padding:64px 56px;color:#fff">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:48px">
      <img src="logo-white.svg" style="width:42px;height:42px;object-fit:contain">
      <div style="font-weight:800;font-size:28px;letter-spacing:-0.6px">mutual<span style="font-size:11px;vertical-align:super;color:#94a3b8;font-weight:500">™</span></div>
    </div>
    <div style="font-weight:800;font-size:60px;letter-spacing:-1.8px;color:#fff;line-height:1">Yejun Jang</div>
    <div style="margin-top:10px;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:30px;color:#94a3b8;letter-spacing:-0.4px">장예준</div>
    <div style="margin-top:18px;font-weight:600;font-size:22px;color:#22d3ee;letter-spacing:-0.3px">CEO · AI & Security</div>
    <div style="margin-top:6px;font-family:'Noto Sans KR',sans-serif;font-weight:500;font-size:18px;color:#94a3b8">대표이사 · AI 보안</div>
  </div>
  <div style="position:absolute;right:0;top:0;width:50%;height:100%;background:#f7f3ec;padding:64px 56px;color:#0f172a">
    <div style="font-family:'JetBrains Mono',monospace;font-size:18px;line-height:2.0;color:#334155;font-weight:500">
      <div>yejun@mutual.solutions</div>
      <div>mutual.solutions</div>
      <div>linkedin.com/in/yejunjang</div>
    </div>
    <div style="display:flex;align-items:center;gap:18px;margin-top:48px">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&format=svg&qzone=1&color=0f172a&bgcolor=f7f3ec&data=BEGIN%3AVCARD%0AVERSION%3A3.0%0AFN%3AYejun%20Jang%0AN%3AJang%3BYejun%0ATITLE%3ACEO%20AI%20%26%20Security%0AORG%3Amutual%0AEMAIL%3Ayejun%40mutual.solutions%0AURL%3Ahttps%3A%2F%2Fmutual.solutions%0AEND%3AVCARD" style="width:140px;height:140px;background:#fff;padding:8px;border-radius:6px;box-shadow:0 0 0 1px #4a8b9c33">
      <div style="font-family:'JetBrains Mono',monospace;font-size:16px;color:#64748b;line-height:1.4"><div style="color:#0f172a;font-weight:600;letter-spacing:1px">SCAN · vCard</div><div style="font-family:'Noto Sans KR',sans-serif;color:#94a3b8;margin-top:2px">스캔 · 연락처</div></div>
    </div>
  </div>
</div></body></html>
