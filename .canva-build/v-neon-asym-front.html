<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1050px;height:600px;background:#0d0a1f;font-family:'Inter','Segoe UI','SF Pro Display','Helvetica Neue',Helvetica,Arial,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;color:#fff;overflow:hidden;-webkit-font-smoothing:antialiased}
.card{position:relative;width:1050px;height:600px;background:linear-gradient(135deg,#0d0a1f 0%,#1a0f3a 60%,#2a0f4a 100%);overflow:hidden}


.tick{position:absolute;width:18px;height:18px;border-color:#22d3ee}
.tl{top:42px;left:42px;border-top:1.5px solid;border-left:1.5px solid}
.tr{top:42px;right:42px;border-top:1.5px solid;border-right:1.5px solid}
.bl{bottom:42px;left:42px;border-bottom:1.5px solid;border-left:1.5px solid}
.br{bottom:42px;right:42px;border-bottom:1.5px solid;border-right:1.5px solid}
</style></head><body><div class="card">
  
  
  <div style="position:absolute;right:-40px;top:-40px;width:280px;height:280px;background:#f0abfc22;transform:rotate(45deg);z-index:0"></div><div style="position:absolute;right:-100px;bottom:-100px;width:380px;height:380px;background:#f0abfc11;transform:rotate(45deg);z-index:0;border:2px solid #f0abfc44"></div>
  
  <div class="tick tl"></div><div class="tick tr"></div><div class="tick bl"></div><div class="tick br"></div>
  <div style="position:absolute;top:88px;left:64px;display:flex;align-items:center;gap:28px;justify-content:flex-start;z-index:2">
    <img src="logo-magenta.svg" style="width:104px;height:104px;object-fit:contain">
    <div style="font-weight:800;font-size:96px;letter-spacing:-3.8px;color:#fff;line-height:1">mutual<span style="font-size:24px;vertical-align:super;font-weight:500;letter-spacing:0;margin-left:4px;color:#a78bfa">™</span></div>
  </div>
  <div style="position:absolute;left:64px;bottom:172px;text-align:left;z-index:2">
    <div style="font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:36px;color:#22d3ee;letter-spacing:-0.8px;line-height:1.2">진본은 출처에서 시작됩니다.</div>
    <div style="margin-top:14px;font-weight:600;font-size:30px;color:#a78bfa;letter-spacing:-0.4px;line-height:1.3;font-style:italic">Authenticity starts at the source.</div>
  </div>
  <div style="position:absolute;left:64px;right:64px;bottom:96px;height:1px;background:#a78bfa44"></div>
  <div style="position:absolute;left:64px;right:64px;bottom:60px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:24px;color:#a78bfa;letter-spacing:0.6px;font-weight:500;z-index:2">
    <div style="display:flex;gap:20px"><span style="color:#f0abfc;font-weight:600">C2PA</span><span>·</span><span style="color:#f0abfc;font-weight:600">ECDSA</span><span>·</span><span style="color:#f0abfc;font-weight:600">TrustZone</span></div>
    <div>mutual.solutions</div>
  </div>
</div></body></html>
