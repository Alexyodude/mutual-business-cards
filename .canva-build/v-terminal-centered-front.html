<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1050px;height:600px;background:#0a0d0a;font-family:'Inter','Segoe UI','SF Pro Display','Helvetica Neue',Helvetica,Arial,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;color:#22ff88;overflow:hidden;-webkit-font-smoothing:antialiased}
.card{position:relative;width:1050px;height:600px;background:radial-gradient(ellipse at center,#0a1410 0%,#050805 100%);overflow:hidden}
.grid{position:absolute;inset:0;background-image:linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);background-size:42px 42px;mask-image:linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.95));-webkit-mask-image:linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.95))}

.tick{position:absolute;width:18px;height:18px;border-color:#0a8d4a}
.tl{top:42px;left:42px;border-top:1.5px solid;border-left:1.5px solid}
.tr{top:42px;right:42px;border-top:1.5px solid;border-right:1.5px solid}
.bl{bottom:42px;left:42px;border-bottom:1.5px solid;border-left:1.5px solid}
.br{bottom:42px;right:42px;border-bottom:1.5px solid;border-right:1.5px solid}
</style></head><body><div class="card">
  <div class="grid"></div>
  
  
  
  <div class="tick tl"></div><div class="tick tr"></div><div class="tick bl"></div><div class="tick br"></div>
  <div style="position:absolute;top:120px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:28px;justify-content:center;z-index:2">
    <img src="logo-green.svg" style="width:104px;height:104px;object-fit:contain">
    <div style="font-weight:800;font-size:96px;letter-spacing:-3.8px;color:#22ff88;line-height:1">mutual<span style="font-size:24px;vertical-align:super;font-weight:500;letter-spacing:0;margin-left:4px;color:#0a8d4a">™</span></div>
  </div>
  <div style="position:absolute;left:0;right:0;bottom:172px;text-align:center;z-index:2">
    <div style="font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:36px;color:#0a8d4a;letter-spacing:-0.8px;line-height:1.2">진본은 출처에서 시작됩니다.</div>
    <div style="margin-top:14px;font-weight:600;font-size:30px;color:#0a8d4a;letter-spacing:-0.4px;line-height:1.3;font-style:italic">Authenticity starts at the source.</div>
  </div>
  <div style="position:absolute;left:96px;right:96px;bottom:96px;height:1px;background:#0a8d4a44"></div>
  <div style="position:absolute;left:96px;right:96px;bottom:60px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:24px;color:#0a8d4a;letter-spacing:0.6px;font-weight:500;z-index:2">
    <div style="display:flex;gap:20px"><span style="color:#22ff88;font-weight:600">C2PA</span><span>·</span><span style="color:#22ff88;font-weight:600">ECDSA</span><span>·</span><span style="color:#22ff88;font-weight:600">TrustZone</span></div>
    <div>mutual.solutions</div>
  </div>
</div></body></html>
