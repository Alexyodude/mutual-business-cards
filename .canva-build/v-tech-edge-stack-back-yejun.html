<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1050px;height:600px;background:#0f172a;font-family:'Inter','Segoe UI','SF Pro Display','Helvetica Neue',Helvetica,Arial,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;color:#fff;overflow:hidden;-webkit-font-smoothing:antialiased}
.card{position:relative;width:1050px;height:600px;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);overflow:hidden}
.grid{position:absolute;inset:0;background-image:linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);background-size:42px 42px;mask-image:linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.95));-webkit-mask-image:linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.95))}
.tick{position:absolute;width:18px;height:18px;border-color:#4a8b9c}
.tl{top:42px;left:42px;border-top:1.5px solid;border-left:1.5px solid}
.tr{top:42px;right:42px;border-top:1.5px solid;border-right:1.5px solid}
.bl{bottom:42px;left:42px;border-bottom:1.5px solid;border-left:1.5px solid}
.br{bottom:42px;right:42px;border-bottom:1.5px solid;border-right:1.5px solid}
.mono{font-family:'JetBrains Mono','Consolas','Menlo','Monaco',monospace}
.ko{font-family:'Noto Sans KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif}
</style></head><body>
<div class="card">
  <div class="grid"></div>
  <div style="position:absolute;left:0;top:0;bottom:0;width:96px"><div style="position:absolute;left:0px;top:0;bottom:0;width:14px;background:linear-gradient(180deg,#22d3ee 0%,#4a8b9c 100%);opacity:1;box-shadow:0 0 20px #22d3ee55"></div><div style="position:absolute;left:22px;top:0;bottom:0;width:6px;background:linear-gradient(180deg,#22d3ee 0%,#4a8b9c 100%);opacity:0.55;"></div><div style="position:absolute;left:36px;top:0;bottom:0;width:10px;background:linear-gradient(180deg,#22d3ee 0%,#4a8b9c 100%);opacity:0.85;box-shadow:0 0 20px #22d3ee55"></div><div style="position:absolute;left:52px;top:0;bottom:0;width:4px;background:linear-gradient(180deg,#22d3ee 0%,#4a8b9c 100%);opacity:0.45;"></div><div style="position:absolute;left:62px;top:0;bottom:0;width:8px;background:linear-gradient(180deg,#22d3ee 0%,#4a8b9c 100%);opacity:0.7;box-shadow:0 0 20px #22d3ee55"></div><div style="position:absolute;left:76px;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#22d3ee 0%,#4a8b9c 100%);opacity:0.3;"></div></div>
  <div class="tick tl"></div><div class="tick tr"></div><div class="tick bl"></div><div class="tick br"></div>

  <!-- small wordmark -->
  <div style="position:absolute;top:64px;right:96px;display:flex;align-items:center;gap:14px;z-index:2">
    <img src="logo-white.svg" style="width:48px;height:48px;object-fit:contain">
    <div style="font-weight:800;font-size:32px;letter-spacing:-0.8px;color:#fff">mutual<span style="font-size:13px;vertical-align:super;color:#94a3b8;font-weight:500">™</span></div>
  </div>

  <!-- name block -->
  <div style="position:absolute;top:172px;left:140px;max-width:600px;z-index:2">
    <div style="font-weight:800;font-size:60px;letter-spacing:-1.8px;color:#fff;line-height:1">Yejun Jang</div>
    <div class="ko" style="margin-top:10px;font-weight:700;font-size:32px;color:#94a3b8;letter-spacing:-0.4px">장예준</div>
    <div style="margin-top:18px;font-weight:600;font-size:28px;color:#22d3ee;letter-spacing:-0.3px">CEO · AI & Security</div>
    <div class="ko" style="margin-top:6px;font-weight:500;font-size:22px;color:#94a3b8">대표이사 · AI 보안</div>
    <div style="margin-top:26px;width:96px;height:3px;background:#22d3ee"></div>
  </div>

  <!-- contact mono block -->
  <div class="mono" style="position:absolute;left:140px;bottom:64px;font-size:22px;line-height:1.85;color:#fff;letter-spacing:0.1px;font-weight:500;z-index:2">
    <div>yejun@mutual.solutions</div>
    <div>mutual.solutions</div>
    <div>linkedin.com/in/yejunjang</div>
  </div>

  <!-- QR + label -->
  <img src="qr-yejun.svg" style="position:absolute;right:96px;bottom:96px;width:160px;height:160px;background:#0f172a;padding:10px;border-radius:6px;box-shadow:0 0 0 1px #22d3ee33;z-index:2">
  <div class="mono" style="position:absolute;right:96px;bottom:64px;font-size:14px;color:#94a3b8;letter-spacing:1px;text-align:right;width:160px;z-index:2"><span style="color:#22d3ee">SCAN</span> · ADD · <span class="ko">스캔</span></div>
</div></body></html>
